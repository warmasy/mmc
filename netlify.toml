[build]
  # 构建命令，使用生产环境打包
  command = "npm run build:prod"
  # Vite 构建输出目录
  publish = "dist"

[build.environment]
  # 设置 Node 版本（根据你的本地版本调整，18/20 都可以）
  NODE_VERSION = "20"
  # 确保生产环境变量
  VITE_APP_ENV = "production"

# SPA 路由重定向：所有路径都指向 index.html，由 Vue Router 处理
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 可选：缓存静态资源
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
